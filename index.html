<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finkly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #2C3EA5;
      margin-bottom: 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dde3eb;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 420px;
      width: calc(100% - 32px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #2C3EA5, #3498DB);
      border-radius: 2px;
      margin: 20px auto;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #aaaaaa;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">&#127968; Finkly</div>
    <div class="icon">🔒</div>
    <h1>Dominio registrado</h1>
    <div class="divider"></div>
    <p>Este dominio ha sido registrado y está siendo configurado.<br>Vuelve pronto.</p>
  </div>

  <p class="footer">© 2026 Finkly · Todos los derechos reservados</p>

</body>
</html>
