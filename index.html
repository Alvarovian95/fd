<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>finkly.es</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 48px 56px;
      text-align: center;
      max-width: 460px;
      width: calc(100% - 32px);
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111;
    }

    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Dominio registrado</h1>
    <p>Este dominio ha sido registrado recientemente.<br>El sitio web estará disponible próximamente.</p>
  </div>

  <p class="footer">finkly.es</p>

</body>
</html>
